<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — PaperFormat Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Syne', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
          colors: {
            ink: '#0A0A0A',
            paper: '#F5F5F0',
            rule: '#D4D4CC',
            blue: '#1A56FF',
            'blue-dark': '#1040D0',
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #F5F5F0;
      color: #0A0A0A;
      font-family: 'Syne', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #login-overlay {
      position: fixed;
      inset: 0;
      background: #F5F5F0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .login-box {
      border: 1.5px solid #0A0A0A;
      background: #fff;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .field-input {
      width: 100%;
      background: #fff;
      border: 1.5px solid #0A0A0A;
      padding: 0.75rem 1rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      color: #0A0A0A;
      outline: none;
      border-radius: 0;
    }
    .field-input:focus {
      border-color: #1A56FF;
      box-shadow: 0 0 0 2px rgba(26,86,255,0.15);
    }

    .btn-primary {
      background: #0A0A0A;
      color: #F5F5F0;
      border: 1.5px solid #0A0A0A;
      padding: 0.75rem 1.5rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
    }
    .btn-primary:hover { background: #1A56FF; border-color: #1A56FF; }

    .topbar { border-bottom: 1.5px solid #0A0A0A; }

    .data-table { width: 100%; border-collapse: collapse; }
    .data-table thead th {
      background: #0A0A0A;
      color: #F5F5F0;
      padding: 0.75rem 1rem;
      text-align: left;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
    }
    .data-table tbody tr {
      border-bottom: 1px solid #D4D4CC;
      background: #fff;
    }
    .data-table td {
      padding: 0.85rem 1rem;
      font-size: 0.875rem;
      vertical-align: top;
    }

    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      padding: 0.2rem 0.55rem;
      border: 1.5px solid;
      text-transform: uppercase;
    }
    .badge-pending { color: #B45309; border-color: #B45309; background: rgba(180,83,9,0.06); }
    .badge-completed { color: #166534; border-color: #166534; background: rgba(22,101,52,0.06); }

    .btn-action {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 0.35rem 0.75rem;
      border: 1.5px solid #0A0A0A;
      background: transparent;
      cursor: pointer;
      text-transform: uppercase;
    }
    .btn-action:hover { background: #0A0A0A; color: #F5F5F0; }

    /* New Red Delete Button */
    .btn-delete {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 0.35rem 0.75rem;
      border: 1.5px solid #CC2200;
      color: #CC2200;
      background: transparent;
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }
    .btn-delete:hover { background: #CC2200; color: #fff; }

    /* Collapsible Instructions */
    .instructions-cell {
      max-width: 220px;
      max-height: 50px;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      font-size: 0.75rem;
      color: #6B7280;
      line-height: 1.4;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .instructions-cell.expanded {
      max-width: 400px;
      max-height: 500px;
      white-space: pre-wrap;
      overflow: visible;
      color: #0A0A0A;
      background: #f9f9f9;
      padding: 5px;
      border: 1px dashed #D4D4CC;
    }

    .stat-card { border: 1.5px solid #D4D4CC; background: #fff; padding: 1rem 1.25rem; }
    .id-cell { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: #6B7280; }
    .link-blue { color: #1A56FF; text-decoration: underline; font-size: 0.85rem; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <div id="login-overlay">
    <div class="login-box">
      <h1 class="text-xl font-bold mb-1">Restricted Access</h1>
      <p class="text-sm text-gray-500 mb-7">Enter admin credentials to continue.</p>
      <div class="mb-4">
        <label class="field-label text-xs font-bold uppercase" for="admin-user">Username</label>
        <input type="text" id="admin-user" class="field-input" placeholder="admin" />
      </div>
      <div class="mb-5">
        <label class="field-label text-xs font-bold uppercase" for="admin-pass">Password</label>
        <input type="password" id="admin-pass" class="field-input" placeholder="••••••••" />
        <div class="error-login text-red-600 text-xs mt-2" id="login-error"></div>
      </div>
      <button class="btn-primary" onclick="doLogin()">Access Dashboard</button>
    </div>
  </div>

  <div id="admin-panel" class="hidden flex-col min-h-screen">
    <header class="topbar px-6 py-4 flex items-center justify-between sticky top-0 bg-paper z-40">
      <div class="flex items-center gap-3">
        <span class="font-mono text-sm font-medium tracking-widest uppercase">PaperFormat</span>
        <span class="font-mono text-xs text-blue border border-blue px-2 py-0.5">ADMIN</span>
      </div>
      <div class="flex gap-4">
        <button onclick="loadOrders()" class="font-mono text-xs border border-rule px-3 py-1.5 bg-white uppercase">Refresh</button>
        <button onclick="doLogout()" class="font-mono text-xs border border-ink px-3 py-1.5 uppercase hover:bg-ink hover:text-paper">Logout</button>
      </div>
    </header>

    <main class="flex-1 px-6 py-10">
      <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-8">
          <h2 class="text-2xl font-bold uppercase tracking-tight">Order Requests</h2>
          <div class="font-mono text-xs text-gray-400" id="last-refresh">Last refreshed: --</div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
          <div class="stat-card"><div class="font-mono text-2xl" id="stat-total">0</div><div class="text-xs text-gray-400 uppercase">Total</div></div>
          <div class="stat-card"><div class="font-mono text-2xl text-amber-600" id="stat-pending">0</div><div class="text-xs text-gray-400 uppercase">Pending</div></div>
          <div class="stat-card"><div class="font-mono text-2xl text-green-700" id="stat-completed">0</div><div class="text-xs text-gray-400 uppercase">Completed</div></div>
          <div class="stat-card"><div class="font-mono text-2xl text-blue" id="stat-files">0</div><div class="text-xs text-gray-400 uppercase">Files</div></div>
        </div>

        <div class="border border-ink overflow-x-auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th><th>Date</th><th>Name</th><th>WhatsApp</th><th>Topic</th><th>Format</th><th>File</th><th>Instructions</th><th>Status</th><th>Action</th>
              </tr>
            </thead>
            <tbody id="orders-tbody">
              <tr><td colspan="10" class="text-center py-10 font-mono text-gray-400">Loading orders...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

<script>
const BACKEND_URL = "https://researchpaperservice-production.up.railway.app";
const ADMIN_USER = "admin";
const ADMIN_PASS = "paperformat2024";
let authToken = null;

function doLogin() {
  const user = document.getElementById("admin-user").value.trim();
  const pass = document.getElementById("admin-pass").value;
  if (user === ADMIN_USER && pass === ADMIN_PASS) {
    authToken = btoa(`${user}:${pass}`);
    sessionStorage.setItem("pf_admin", authToken);
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("admin-panel").style.display = "flex";
    loadOrders();
  } else {
    document.getElementById("login-error").textContent = "Invalid credentials.";
  }
}

function doLogout() {
  sessionStorage.removeItem("pf_admin");
  location.reload();
}

async function loadOrders() {
  const tbody = document.getElementById("orders-tbody");
  try {
    const res = await fetch(`${BACKEND_URL}/orders`, {
      headers: { "Authorization": `Basic ${authToken}` }
    });
    const orders = await res.json();
    renderOrders(orders);
    updateStats(orders);
    document.getElementById("last-refresh").textContent = `Last refreshed: ${new Date().toLocaleTimeString()}`;
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="10" class="text-center py-10 text-red-600">Backend Error</td></tr>`;
  }
}

function renderOrders(orders) {
  const tbody = document.getElementById("orders-tbody");
  if (!orders.length) { tbody.innerHTML = '<tr><td colspan="10" class="text-center py-10 font-mono">No entries</td></tr>'; return; }
  
  const sorted = [...orders].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  tbody.innerHTML = sorted.map(order => {
    const whatsappNum = order.phone.replace(/\D/g, "");
    return `
      <tr id="row-${order.id}">
        <td class="id-cell">#${order.id}</td>
        <td class="id-cell">${new Date(order.created_at).toLocaleDateString()}</td>
        <td class="font-bold">${order.full_name}</td>
        <td><a href="https://wa.me/${whatsappNum}" target="_blank" class="link-blue">${order.phone}</a></td>
        <td class="topic-cell truncate max-w-[150px]">${order.topic}</td>
        <td class="font-mono text-xs">${order.formatting_type || '—'}</td>
        <td>${order.file_url ? `<a href="${BACKEND_URL}${order.file_url}" target="_blank" class="link-blue">Download</a>` : '—'}</td>
        <td><div class="instructions-cell" onclick="this.classList.toggle('expanded')" title="Click to expand">${order.instructions || '—'}</div></td>
        <td><span class="badge ${order.status === 'completed' ? 'badge-completed' : 'badge-pending'}">${order.status}</span></td>
        <td class="flex flex-col gap-1">
          <button class="btn-action" onclick="toggleStatus(${order.id}, '${order.status === 'completed' ? 'pending' : 'completed'}')">Toggle</button>
          <button class="btn-delete" onclick="deleteOrder(${order.id})">Delete</button>
        </td>
      </tr>`;
  }).join("");
}

function updateStats(orders) {
  document.getElementById("stat-total").textContent = orders.length;
  document.getElementById("stat-pending").textContent = orders.filter(o => o.status === "pending").length;
  document.getElementById("stat-completed").textContent = orders.filter(o => o.status === "completed").length;
  document.getElementById("stat-files").textContent = orders.filter(o => o.file_url).length;
}

async function toggleStatus(orderId, newStatus) {
  await fetch(`${BACKEND_URL}/orders/${orderId}/status`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json", "Authorization": `Basic ${authToken}` },
    body: JSON.stringify({ status: newStatus })
  });
  loadOrders();
}

async function deleteOrder(orderId) {
  if (!confirm("Delete this order?")) return;
  await fetch(`${BACKEND_URL}/orders/${orderId}`, {
    method: "DELETE",
    headers: { "Authorization": `Basic ${authToken}` }
  });
  loadOrders();
}

window.onload = () => {
  const saved = sessionStorage.getItem("pf_admin");
  if (saved) { authToken = saved; document.getElementById("login-overlay").style.display = "none"; document.getElementById("admin-panel").style.display = "flex"; loadOrders(); }
};
</script>
</body>
</html>
